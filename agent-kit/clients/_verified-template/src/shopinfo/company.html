<!--@layout(/layout/basic/layout.html)-->
<!--@css(/_nk/css/nk-etc.css)-->
<div class="nk-etc nk-etc-shopinfo nk-etc-company">
<!-- ============================================================
     shopinfo/company.html — 회사소개 리스킨 (Wave2-ETC · narrow형 720px)
     스타일: nk-etc.css(.nk-etc-company — 라인 위주 2열 정보 테이블, 모바일 세로 스택은 CSS만).
     stock 대비 보존 module: mall_company · Layout_footer(테이블). {$변수}(mailto/tel 링크 포함)·
     {$map_display|display}·{$info}·{$map_image} 전부 원형 보존 — 변경은 nk- 클래스 부여와
     module 밖 래퍼/정적 헤드 추가뿐(새 인라인 style 0건).
     정적 .path/.titleArea(module 아님)는 Wave1 login.html 컨벤션대로 중앙 영문 헤드로 대체.
     ============================================================ -->
<div class="nk-etc__head">
    <h1 class="nk-etc__title">About Us</h1>
    <p class="nk-etc__sub">회사소개</p>
</div>

<div module="mall_company">
    <div class="ec-base-table" module="Layout_footer">
        <table border="0">
            <caption>회사소개</caption>
            <colgroup>
                <col style="width:180px;">
                <col style="width:auto;">
            </colgroup>
            <tbody>
                <tr>
                    <th scope="row">상점명</th>
                    <td>{$mall_name}</td>
                </tr>
                <tr>
                    <th scope="row">대표이사</th>
                    <td><a href="mailto:{$email}">{$president_name}</a></td>
                </tr>
                <tr>
                    <th scope="row">대표전화</th>
                    <td><a href="tel:{$phone}">{$phone}</a></td>
                </tr>
                <tr>
                    <th scope="row">주소</th>
                    <td>{$mall_addr1}<br />{$mall_addr2}</td>
                </tr>
                <tr>
                    <th scope="row">사업자등록번호</th>
                    <td>{$company_regno}</td>
                </tr>
                <tr>
                    <th scope="row">통신판매업신고</th>
                    <td>{$network_regno}</td>
                </tr>
                <tr class="{$cpo_email|display}">
                    <th scope="row">개인정보 관리책임</th>
                    <td><a href="mailto:{$cpo_email}">{$cpo_name}</a></td>
                </tr>
                <tr>
                    <th scope="row">호스팅제공</th>
                    <td>카페24(주)</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="nk-etc-company__info">{$info}</div>

    <div class="{$map_display|display} nk-etc-company__map">
        <h3>위치</h3>
        <p>{$map_image}</p>
    </div>
</div>
</div><!-- /.nk-etc-company -->
