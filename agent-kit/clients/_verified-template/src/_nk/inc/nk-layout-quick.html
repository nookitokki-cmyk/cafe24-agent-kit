    <div id="quick" class="nk-quick">
        <div module="Layout_orderBasketcount" class="nk-quick__basket">
            <a href="/order/basket.html" class="nk-quick__basket-link">
                <span class="nk-quick__basket-label">장바구니</span>
                <span class="nk-quick__basket-count">{$basket_count}</span>
            </a>
        </div>

        <div module="Layout_productRecent" class="nk-quick__recent">
            <h2 class="nk-quick__recent-title"><a href="/product/recent_view_product.html">최근 본 상품</a></h2>
            <ul class="nk-quick__recent-list">
                <li class="nk-quick__recent-item {$disp_recent|display}">
                    <a href="/product/detail.html{$param}" class="nk-quick__recent-link">
                        <img src="{$recent_img}" alt="" class="nk-quick__recent-img" />
                        <span class="nk-quick__recent-name">{$name}</span>
                    </a>
                </li>
                <li class="nk-quick__recent-item {$disp_recent|display}">
                    <a href="/product/detail.html{$param}" class="nk-quick__recent-link">
                        <img src="{$recent_img}" alt="" class="nk-quick__recent-img" />
                        <span class="nk-quick__recent-name">{$name}</span>
                    </a>
                </li>
            </ul>
            <p class="nk-quick__recent-nav player">
                <button type="button" class="nk-quick__recent-prev prev" aria-label="이전 제품"><i class="ph ph-caret-left"></i></button>
                <button type="button" class="nk-quick__recent-next next" aria-label="다음 제품"><i class="ph ph-caret-right"></i></button>
            </p>
        </div>

        <p class="pageTop nk-quick__top">
            <a href="#header" class="nk-quick__top-link" title="화면 최상단으로 이동하기" aria-label="맨위로"><i class="ph ph-arrow-up"></i></a>
        </p>
    </div>
