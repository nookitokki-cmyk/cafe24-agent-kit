<!--!
 * nk-product-card — 상품 카드 (이미지 + hover 2번째 이미지 + 가격 + 신상품 배지)
 * 사용처: 상품 목록 페이지 (product/list.html). ModuleProductList 안의 each 반복 단위.
 * 의존성:
 *   - CSS 변수: --nk-color-text / --nk-color-text-sub / --nk-color-border / --nk-radius-md / --nk-space-sm
 *   - JS: snippets/js/nk-product-hover.js (마우스오버 이미지 전환, 선택)
 *
 * 비코더 사용법:
 *   1. ModuleProductList 안의 <li> 반복 영역에 이 HTML 붙여넣기
 *   2. 카페24 변수는 그대로 두면 자동 치환됨 (수정 금지)
 *   3. SFTP로 업로드
 *
 * 카페24 변수 사용 시 주의:
 *   {$image_medium}, {$product_name}, {$product_price}, {$product_sale_price} 등은
 *   반드시 ModuleProductList 안에서만 작동. 모듈 바깥에서 쓰면 그대로 출력됨.
-->

<article class="nk-product-card">

  <!-- 이미지 영역: aspect-ratio 고정으로 레이아웃 안정 -->
  <a href="{$link_product_detail}" class="nk-product-img-link" aria-label="{$product_name}">
    <div class="nk-product-img" data-nk-product-hover>
      <img src="{$image_medium}" alt="{$product_name}" class="nk-product-img-main" loading="lazy">
      <!-- 2번째 이미지 (마우스오버 시 전환). data-hover-src 가 있으면 nk-product-hover.js 가 자동 처리.
           카페24에 2번째 이미지 변수가 없으면 이 줄 통째로 삭제해도 OK -->
      <img src="{$image_medium}" alt="" class="nk-product-img-hover" aria-hidden="true" loading="lazy" data-hover-placeholder>
    </div>

    <!-- 배지 영역: 신상품·세일 등 -->
    <div class="nk-product-badges" aria-hidden="true">
      {$new_icon}
      {$sale_icon}
      {$soldout_icon}
    </div>
  </a>

  <!-- 정보 영역 -->
  <div class="nk-product-info">
    <h3 class="nk-product-name">
      <a href="{$link_product_detail}">{$product_name}</a>
    </h3>

    <div class="nk-product-prices">
      <!-- 할인 중이면 정가에 취소선 표시. 카페24 변수가 비어있으면 자동 숨김 -->
      <span class="nk-product-price-original">{$product_price}</span>
      <span class="nk-product-price-sale">{$product_sale_price}</span>
    </div>

    <!-- 추천 아이콘 등 추가 표시 -->
    <div class="nk-product-meta">
      {$recommend_icon}
    </div>
  </div>

</article>

<style>
  .nk-product-card{
    background:var(--nk-color-bg, #fff);
    border:1px solid transparent;
    border-radius:var(--nk-radius-md, 12px);
    overflow:hidden;
    transition:border-color .2s, transform .2s;
  }
  .nk-product-card:hover{border-color:var(--nk-color-border); transform:translateY(-2px)}
  .nk-product-img-link{position:relative; display:block; color:inherit}
  .nk-product-img{
    position:relative;
    aspect-ratio:1/1;
    background:var(--nk-color-surface, #f8f9fa);
    overflow:hidden;
  }
  .nk-product-img img{
    position:absolute; inset:0;
    width:100%; height:100%; object-fit:cover;
    transition:opacity .3s;
  }
  .nk-product-img-hover{opacity:0}
  .nk-product-img:hover .nk-product-img-main{opacity:0}
  .nk-product-img:hover .nk-product-img-hover{opacity:1}
  .nk-product-badges{
    position:absolute; top:var(--nk-space-sm, 8px); left:var(--nk-space-sm, 8px);
    display:flex; flex-direction:column; gap:4px;
  }
  .nk-product-info{padding:var(--nk-space-md, 16px) var(--nk-space-sm, 8px)}
  .nk-product-name{
    margin:0 0 8px; font-size:14px; font-weight:500;
    line-height:1.4;
    /* 2줄 말줄임 */
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .nk-product-name a{color:var(--nk-color-text)}
  .nk-product-prices{
    display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;
  }
  .nk-product-price-original{
    color:var(--nk-color-text-sub, #5f6368);
    font-size:13px; text-decoration:line-through;
  }
  .nk-product-price-original:empty{display:none}
  .nk-product-price-sale{
    color:var(--nk-color-text); font-size:15px; font-weight:700;
  }
  .nk-product-meta{margin-top:8px; min-height:1em}
  .nk-product-meta:empty{display:none}
</style>
