<!--!
 * nk-header-sticky — 스크롤 시 고정되는 헤더 (로고·GNB·검색·장바구니 배지)
 * 사용처: 카페24 layout/basic/layout.html 또는 _nk/inc/header.html
 * 의존성:
 *   - CSS 변수: --nk-bg / --nk-font / --nk-border / (리터럴 16px) / (리터럴 0 2px 8px rgba(0,0,0,.08))
 *   - JS: snippets/js/nk-sticky-header.js (scroll shadow 효과)
 *   - Phosphor Icons CDN
 *
 * 비코더 사용법:
 *   1. layout.html 의 <body> 바로 다음에 이 HTML 통째로 붙여넣기
 *   2. "여기만 바꾸세요" 표시된 부분의 텍스트·링크를 본인 쇼핑몰 정보로 교체
 *   3. SFTP로 업로드
 *
 * 카페24 변수 사용 시 주의: 모든 {$변수}는 해당 module scope 안에서만 치환된다(밖에서는 빈 값).
 *   장바구니 수는 module="Layout_orderBasketcount" 안의 {$basket_count}로만 유효.
-->

<header class="nk-header" data-nk-sticky>

  <!-- 상단 바: 로고 + 검색 + 우측 메뉴 -->
  <div class="nk-header-top">
    <div class="nk-header-inner">

      <!-- 로고 — 여기만 바꾸세요 -->
      <a href="/" class="nk-logo" aria-label="홈으로" module="Layout_LogoTop">
        <span class="nk-logo-text">SHOP</span><!-- 여기만 바꾸세요: 쇼핑몰 이름 텍스트 직접 입력(검증본 패턴) -->
        <!-- 이미지 로고로 바꾸려면 위 span 대신 아래 주석 해제 후 src 경로·alt 텍스트 직접 교체 -->
        <!-- <img src="/web/upload/{스킨번호}/logo.png" alt="쇼핑몰 이름 — 여기만 바꾸세요"> -->
      </a>

      <!-- 검색창 -->
      <form action="/product/search.html" method="get" class="nk-search" role="search">
        <input type="text" name="keyword" class="nk-search-input" placeholder="상품명·키워드 검색" aria-label="상품 검색">
        <button type="submit" class="nk-search-btn" aria-label="검색">
          <i class="ph ph-magnifying-glass" aria-hidden="true"></i>
        </button>
      </form>

      <!-- 우측 아이콘 메뉴 -->
      <nav class="nk-header-actions" aria-label="회원·장바구니">
        <a href="/member/login.html" class="nk-action-btn" aria-label="로그인">
          <i class="ph ph-user" aria-hidden="true"></i>
          <span class="nk-action-label">로그인</span>
        </a>
        <a href="/myshop/wishlist.html" class="nk-action-btn" aria-label="관심상품">
          <i class="ph ph-heart" aria-hidden="true"></i>
          <span class="nk-action-label">위시리스트</span>
        </a>
        <a href="/order/basket.html" class="nk-action-btn nk-action-cart" aria-label="장바구니">
          <i class="ph ph-shopping-cart" aria-hidden="true"></i>
          <span class="nk-action-label">장바구니</span>
          <!-- 장바구니 배지: 0개일 때 자동 숨김은 JS에서 처리 -->
          <span class="nk-cart-badge" data-nk-cart-badge module="Layout_orderBasketcount">{$basket_count}</span>
        </a>
      </nav>

    </div>
  </div>

  <!-- GNB: 메인 카테고리 메뉴 — 여기만 바꾸세요 -->
  <nav class="nk-gnb" aria-label="메인 메뉴">
    <ul class="nk-gnb-list nk-header-inner">
      <li><a href="/">홈</a></li>
      <li><a href="/product/list.html?cate_no=24">신상품</a></li>
      <li><a href="/product/list.html?cate_no=25">베스트</a></li>
      <li><a href="/board/product/list.html?board_no=4">이벤트</a></li>
      <li><a href="/about/">브랜드</a></li>
    </ul>
  </nav>

</header>

<!-- 스타일: nk-header CSS 토큰 사용. !important 없음 -->
<style>
  .nk-header{
    position:sticky; top:0; z-index:100;
    background:var(--nk-bg, #ffffff);
    border-bottom:1px solid var(--nk-border, #e5e7eb);
    transition:box-shadow .2s;
  }
  .nk-header.is-scrolled{box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .nk-header-inner{
    max-width:1440px; margin:0 auto;
    padding:0 16px;
  }
  .nk-header-top{padding:16px 0}
  .nk-header-top .nk-header-inner{
    display:flex; align-items:center; gap:24px;
  }
  .nk-logo{display:flex; align-items:center; gap:8px; font-weight:700; font-size:18px; color:var(--nk-font, #1a1a1a)}
  .nk-logo img{height:32px; width:auto}
  .nk-search{
    flex:1; max-width:480px;
    display:flex; align-items:center; gap:8px;
    background:var(--nk-bg2, #f8f9fa);
    border:1px solid var(--nk-border, #e5e7eb);
    border-radius:var(--nk-radius, 12px);
    padding:8px 14px;
  }
  .nk-search-input{
    flex:1; border:0; outline:0; background:transparent;
    color:var(--nk-font, #1a1a1a); font-family:inherit; font-size:14px;
  }
  .nk-search-btn{
    background:transparent; border:0; cursor:pointer;
    color:var(--nk-sub, #5f6368); font-size:18px;
    width:44px; height:44px; display:inline-flex; align-items:center; justify-content:center;
  }
  .nk-header-actions{display:flex; gap:4px; margin-left:auto}
  .nk-action-btn{
    position:relative;
    min-width:44px; min-height:44px;
    display:inline-flex; flex-direction:column; align-items:center; justify-content:center;
    padding:6px 10px; gap:2px;
    color:var(--nk-font, #1a1a1a); font-size:11px;
  }
  .nk-action-btn i{font-size:22px}
  .nk-action-label{display:none}
  @media(min-width:768px){.nk-action-label{display:inline}}
  .nk-cart-badge{
    position:absolute; top:2px; right:2px;
    min-width:18px; height:18px; padding:0 5px;
    background:var(--nk-point, #222222); color:#fff;
    border-radius:9999px; font-size:11px; font-weight:700;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .nk-cart-badge:empty,.nk-cart-badge[data-zero="true"]{display:none}
  .nk-gnb{border-top:1px solid var(--nk-border, #e5e7eb)}
  .nk-gnb-list{
    list-style:none; margin:0; padding-top:12px; padding-bottom:12px;
    display:flex; gap:24px; overflow-x:auto;
  }
  .nk-gnb-list a{
    color:var(--nk-font, #1a1a1a); font-weight:500; font-size:14px;
    padding:8px 4px; display:inline-block;
  }
  .nk-gnb-list a:hover{color:var(--nk-point, #222222)}
  @media(max-width:767px){
    .nk-search{display:none}
    .nk-header-top .nk-header-inner{gap:16px}
  }
</style>
